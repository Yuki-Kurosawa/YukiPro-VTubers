<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Project | Official Site</title>
    <style>
        :root {
            --theme-color: #ff9dbb; /* 主色调 */
            --bg-grid: #fffdf2;     /* 右侧格纹背景色 */
            --border-width: 8px;    /* 外框粗细 */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffcadd; /* 最外层底色 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 主容器：粉色圆角大框 */
        .outer-frame {
            width: 95vw;
            height: 90vh;
            background: white;
            border: var(--border-width) solid var(--theme-color);
            border-radius: 30px;
            display: flex;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 左侧：内容展示区 */
        .main-display {
            flex: 1;
            position: relative;
            background: linear-gradient(180deg, #fff 0%, #fff0f5 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 5%;
        }

        /* 补全：角色立绘 */
        .char-img {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 100%; 
            z-index: 1;
            pointer-events: none; /* 防止图片遮挡文字点击 */
        }

        /* 标题文字区 */
        .info-overlay {
            position: relative;
            z-index: 2;
            text-align: left;
            margin-left: 20%; /* 避开立绘主体，可根据实际立绘位置调整 */
        }

        /* 侧边导航栏：默认隐藏 */
        .nav-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background-color: var(--bg-grid);
            border-left: 4px solid var(--theme-color);
            background-image: radial-gradient(var(--theme-color) 2px, transparent 0);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            transform: translateX(105%);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 100;
        }

        .nav-sidebar.open {
            transform: translateX(0);
        }

        /* 导航按钮 */
        .nav-item {
            width: 200px;
            height: 45px;
            background: white;
            border: 2px solid var(--theme-color);
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--theme-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--theme-color);
            color: white;
            transform: scale(1.05);
        }

        /* 菜单触发圆点 */
        .menu-trigger {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #26c6da;
            border: 4px solid white;
            border-radius: 50%;
            z-index: 101;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .menu-trigger::after {
            content: "MENU";
            color: white;
            font-size: 10px;
            font-weight: bold;
        }

        /* 遮罩层 */
        .overlay-blur {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 99;
        }

        .overlay-blur.show {
            opacity: 1;
            visibility: visible;
        }

        /* PV 小窗 */
        .pv-thumb {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 180px;
            height: 100px;
            border: 4px solid white;
            border-radius: 15px;
            background: #444; /* 这里建议换成视频封面图 */
            z-index: 5;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .pv-thumb:hover {
            transform: translateY(-5px);
            border-color: var(--theme-color);
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="menu-trigger" onclick="toggleSidebar()"></div>
    
    <div class="overlay-blur" id="mask" onclick="toggleSidebar()"></div>

    <section class="main-display">
        <img src="你的立绘图片.png" class="char-img" alt="">

        <div class="info-overlay">
            <h1 style="font-size: 4rem; margin: 0; color: #444; letter-spacing: -2px;">PROJECT TITLE</h1>
            <p style="background: var(--theme-color); color: white; display: inline-block; padding: 4px 15px; border-radius: 5px; font-weight: bold;">
                2026 COMING SOON
            </p>
        </div>
    </section>

    <aside class="nav-sidebar" id="sidebar">
        <div style="margin-bottom: 40px; text-align: center;">
            <p style="font-size: 1.5rem; font-weight: bold; color: var(--theme-color); margin-top: 20px;">MENU</p>
        </div>
        <nav>
            <a href="#" class="nav-item">TOP</a>
            <a href="#" class="nav-item">NEWS</a>
            <a href="#" class="nav-item">CHARACTER</a>
            <a href="#" class="nav-item">STAFF&CAST</a>
        </nav>
        <button onclick="toggleSidebar()" style="margin-top: 30px; border: none; background: none; color: #999; cursor: pointer; font-size: 12px;">CLOSE ✕</button>
    </aside>

    <div class="pv-thumb">
        <div style="color:white; font-size: 14px; font-weight: bold;">▶ New PV Play</div>
    </div>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');
        sidebar.classList.toggle('open');
        mask.classList.toggle('show');
    }
</script>

</body>
</html>
