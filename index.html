<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki Project | Official Site</title>
    <link rel="stylesheet" href="styles/style.css"> </head>
    <link rel="stylesheet" href="styles/index.css"> </head>
</head>
<body>

<div class="outer-frame">
    <div class="menu-trigger" onclick="toggleSidebar()"></div>
    
    <div class="overlay-blur" id="mask" onclick="toggleSidebar()"></div>

    <section class="main-display">
        <div class="info-overlay">
            <div class="brand-group">
                <h1 class="main-title">Yuki Project</h1>
            </div>  
        </div>
        
        <div class="pv-thumb" style="display: none;">
            <div class="play-icon">▶</div>
            <div class="play-text">NEW PV PLAY</div>
        </div>
    </section>
    <section class="image-display">        
        <img src="/images/01.png" class="char-img" alt="Kurosawa Yuki">
    </section>

    <aside class="nav-sidebar" id="sidebar">
        <div style="margin-bottom: 40px; text-align: center;">
            <p style="font-size: 1.5rem; font-weight: bold; color: var(--theme-color); margin-top: 20px;">MENU</p>
        </div>
        <nav>
            <a href="/" class="nav-item">TOP</a>
            <a href="/news" class="nav-item">NEWS</a>
            <a href="/chara" class="nav-item">CHARACTER</a>
        </nav>
        <button onclick="toggleSidebar()" style="margin-top: 30px; border: none; background: none; color: #999; cursor: pointer; font-size: 12px;">CLOSE ✕</button>
    </aside>

</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('mask');
        sidebar.classList.toggle('open');
        mask.classList.toggle('show');
    }
</script>

</body>
</html>
